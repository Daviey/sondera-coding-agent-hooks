name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test

      - name: Run cargo test
        run: cargo test --workspace

  plugin:
    name: opencode plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: plugin

      - name: Build harness + adapter (for the integration test)
        run: cargo build -p sondera-harness -p sondera-opencode

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: plugins/opencode
        run: bun install

      - name: Typecheck
        working-directory: plugins/opencode
        run: bun run typecheck

      - name: Test (unit, client, integration against the built binaries)
        working-directory: plugins/opencode
        env:
          # runner.temp is private to the job; a world-writable /tmp path would be a predictable,
          # raceable socket location.
          SONDERA_SOCKET: ${{ runner.temp }}/sondera-ci.sock
        run: bun test

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Security Tools
        run: cargo binstall cargo-deny cargo-audit -y

      - name: Deny Check
        run: cargo deny check

      - name: Audit
        run: cargo audit --deny warnings --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2025-0141 --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2025-0134 --ignore RUSTSEC-2026-0183 --ignore RUSTSEC-2026-0184 --ignore RUSTSEC-2026-0185 --ignore RUSTSEC-2026-0186


  build-apps:
    name: Build app binaries (${{ matrix.os }} - ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/apps-v')
    needs: [ test, lint, security ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: apps-${{ matrix.target }}

      - name: Build binaries
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p sondera-claude \
            -p sondera-copilot \
            -p sondera-cursor \
            -p sondera-gemini \
            -p sondera-opencode \
            -p sondera-harness

      - name: Stage release artifacts
        run: |
          tar -czvf sondera-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release \
            sondera-claude sondera-copilot sondera-cursor sondera-gemini sondera-opencode-adapter sondera-harness-server
          # standalone adapter binary for the opencode plugin's install.sh
          cp target/${{ matrix.target }}/release/sondera-opencode-adapter \
             sondera-opencode-adapter-${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            sondera-${{ matrix.target }}.*
            sondera-opencode-adapter-${{ matrix.target }}

  release-apps:
    name: Create GitHub Release for Apps
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/apps-v')
    needs: [ build-apps ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: dist
          merge-multiple: true

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Build plugin bundle
        working-directory: plugins/opencode
        run: |
          bun install
          bun run sync-bundle

      - name: Stage plugin bundle
        run: cp plugins/opencode/sondera-bundled.ts dist/

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}
          prerelease: ${{ github.ref == 'refs/heads/main' }}
          files: dist/*
          generate_release_notes: true

  publish-npm:
    name: Publish opencode plugin to npm
    if: startsWith(github.ref, 'refs/tags/plugin-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup npm
        uses: actions/setup-node@v4
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Publish
        working-directory: plugins/opencode
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # prepublishOnly (in package.json) runs sync-bundle to build sondera-bundled.ts first.
        # Requires the NPM_TOKEN repo secret and a fresh version (the 0.0.x series is taken).
        run: npm publish --provenance --access public
