# Baseline Data Sensitivity Classification
#
# A single label template with sensitivity categories for classifying data
# based on Microsoft Purview sensitivity labels (Public, Internal, Confidential,
# Highly Confidential). Uses the Harmony prompt format. Works with any provider configured via
# ~/.sondera/env (Anthropic, OpenAI, Ollama, Vertex, z.ai).
#
# See: https://learn.microsoft.com/en-us/purview/sensitivity-labels

[[labels]]
name = "DATA_SENSITIVITY"
description = "Data sensitivity classification aligned with Microsoft Purview sensitivity labels."
instructions = """\
Evaluate the content for data sensitivity. \
Classify into one of the sensitivity categories below. \
If the content is sensitive, return: {"sensitive": 1, "sensitivity_category": "<label>"} \
If the content is public, return: {"sensitive": 0, "sensitivity_category": "public"}"""

# -- Categories ---------------------------------------------------------------

[[labels.categories]]
label = "public"
definition = """\
Information that can be freely shared externally without restrictions. \
Marketing materials, press releases, public documentation, published content, \
public announcements, open-source code, and publicly available data."""

[[labels.categories]]
label = "internal"
definition = """\
Internal information not intended for public sharing but not highly sensitive. \
Internal communications, meeting notes, general business documents, company \
policies, procedures, internal announcements, project updates, and team \
discussions. For internal use only."""

[[labels.categories]]
label = "confidential"
definition = """\
Sensitive business information requiring protection and access control. \
Business strategies, financial reports, customer lists, internal projects, \
vendor agreements, pricing information, competitive analysis, unpublished \
product roadmaps, and partnership discussions. Should be shared only with \
authorized personnel."""

[[labels.categories]]
label = "highly_confidential"
definition = """\
Most sensitive data requiring strict access control, encryption, and audit \
logging. PII (SSN, financial account numbers, passport numbers), PHI (medical \
records, diagnoses), credentials (passwords, API keys, tokens, certificates, \
private keys), trade secrets, M&A information, executive communications, \
legal holds, and board materials. Unauthorized disclosure could cause \
significant harm to individuals or the organization."""

